<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI Agents - 400+ AI Agents</title>
  <meta name="description" content="Browse 400+ pre-built AI agents for Claude Code. Specialized agents for development, marketing, security, and more.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    header { background: #fff; border-bottom: 1px solid #e5e5e5; position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; padding: 16px 0; gap: 20px; }
    .logo-section { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .brand { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .breadcrumb { color: #888; font-size: 14px; margin-left: auto; }
    .breadcrumb a { color: #666; text-decoration: none; }
    .breadcrumb a:hover { color: #1a1a1a; }
    .page-header { background: #fff; padding: 40px 0; border-bottom: 1px solid #e5e5e5; }
    .page-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .page-header p { color: #666; font-size: 16px; }
    .search-row { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; gap: 16px; flex-wrap: wrap; }
    .search-box { flex: 1; max-width: 400px; position: relative; }
    .search-input { width: 100%; padding: 12px 16px 12px 44px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: inherit; background: #fff; }
    .search-input:focus { outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #888; }
    .count-badge { background: #f5f5f5; padding: 10px 20px; border-radius: 8px; font-size: 14px; color: #666; }
    .count-badge strong { color: #1a1a1a; font-weight: 600; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding-bottom: 60px; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; transition: all 0.2s; text-decoration: none; color: inherit; display: block; }
    .card:hover { border-color: #1a1a1a; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); transform: translateY(-2px); }
    .card-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .card-icon { width: 42px; height: 42px; background: #f5f5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; word-break: break-word; }
    .card-category { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-desc { font-size: 14px; color: #666; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 40px 0; }
    .page-btn { min-width: 40px; height: 40px; padding: 0 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all 0.2s; font-family: inherit; }
    .page-btn:hover:not(:disabled) { border-color: #1a1a1a; color: #1a1a1a; }
    .page-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .loading { text-align: center; padding: 80px 20px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #e5e5e5; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #888; }
    @media (max-width: 768px) { .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; } .breadcrumb { margin-left: 0; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo-section">
        <img src="logo.png" alt="AICCLI" class="logo">
        <span class="brand">AICCLI</span>
      </a>
      <div class="breadcrumb"><a href="index.html">Home</a> / Agents</div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1>🤖 Agents</h1>
      <p>Browse 400+ pre-built AI agents for Claude Code</p>
    </div>
  </div>

  <div class="container">
    <div class="search-row">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        <input type="text" class="search-input" id="search" placeholder="Search agents...">
      </div>
      <div class="count-badge"><strong id="count">0</strong> agents</div>
    </div>

    <div class="grid" id="grid">
      <div class="loading"><div class="loading-spinner"></div><p>Loading agents...</p></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const ITEMS_PER_PAGE = 30;
    let agents = [];
    let filtered = [];
    let page = 1;

    function render(p) {
      const grid = document.getElementById('grid');
      const start = (p - 1) * ITEMS_PER_PAGE;
      const items = filtered.slice(start, start + ITEMS_PER_PAGE);
      
      grid.innerHTML = items.map(a => `
        <a href="agents/${a.category || 'general'}/${a.name}.html" class="card">
          <div class="card-header">
            <div class="card-icon">🤖</div>
            <div class="card-info">
              <div class="card-title">${a.name}</div>
              <div class="card-category">${a.category || 'general'}</div>
            </div>
          </div>
          <div class="card-desc">${(a.description || '').replace(/[#*\[\]]/g, '').substring(0, 150)}</div>
        </a>
      `).join('');

      const total = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      const pag = document.getElementById('pagination');
      let html = `<button class="page-btn" onclick="render(${p-1})" ${p===1?'disabled':''}>←</button>`;
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= p-1 && i <= p+1)) {
          html += `<button class="page-btn ${i===p?'active':''}" onclick="render(${i})">${i}</button>`;
        } else if (i === p-2 || i === p+2) {
          html += '<span style="padding:0 4px;color:#888;">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="render(${p+1})" ${p===total?'disabled':''}>→</button>`;
      pag.innerHTML = html;
    }

    fetch('components.json').then(r => r.json()).then(data => {
      agents = data.agents || [];
      filtered = [...agents];
      document.getElementById('count').textContent = agents.length;
      render(1);
    });

    document.getElementById('search').addEventListener('input', e => {
      const t = e.target.value.toLowerCase();
      filtered = agents.filter(a => a.name.toLowerCase().includes(t) || (a.description && a.description.toLowerCase().includes(t)));
      render(1);
    });
  </script>
</body>
</html>
