<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI Commands - 280+ Components</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a}.container{max-width:1200px;margin:0 auto;padding:0 24px}header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100}.header-inner{display:flex;align-items:center;padding:16px 0;gap:20px}.logo-section{display:flex;align-items:center;gap:12px;text-decoration:none}.logo{width:36px;height:36px;border-radius:8px;object-fit:cover}.brand{font-size:20px;font-weight:700;color:#1a1a1a}.breadcrumb{color:#888;font-size:14px;margin-left:auto}.breadcrumb a{color:#666;text-decoration:none}.page-header{background:#fff;padding:40px 0;border-bottom:1px solid #e5e5e5}.page-header h1{font-size:32px;font-weight:700;margin-bottom:8px}.page-header p{color:#666;font-size:16px}.search-row{display:flex;justify-content:space-between;align-items:center;padding:24px 0;gap:16px}.search-box{flex:1;max-width:400px;position:relative}.search-input{width:100%;padding:12px 16px 12px 44px;border:1px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#fff}.search-input:focus{outline:none;border-color:#1a1a1a}.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#888}.count-badge{background:#f5f5f5;padding:10px 20px;border-radius:8px;font-size:14px}.count-badge strong{font-weight:600}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding-bottom:60px}.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;transition:all .2s;text-decoration:none;color:inherit;display:block}.card:hover{border-color:#1a1a1a;box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-2px)}.card-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}.card-icon{width:42px;height:42px;background:#f5f5f5;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}.card-title{font-size:15px;font-weight:600;flex:1}.card-category{font-size:12px;color:#888;text-transform:uppercase}.card-desc{font-size:14px;color:#666;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.pagination{display:flex;justify-content:center;gap:8px;padding:40px 0}.page-btn{min-width:40px;height:40px;padding:0 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#666;font-family:inherit}.page-btn:hover:not(:disabled){border-color:#1a1a1a;color:#1a1a1a}.page-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.page-btn:disabled{opacity:.4;cursor:not-allowed}.loading{text-align:center;padding:80px;color:#888}@media(max-width:768px){.header-inner{flex-direction:column;align-items:flex-start}.grid{grid-template-columns:1fr}}</style>
</head>
<body>
  <header><div class="container header-inner"><a href="index.html" class="logo-section"><img src="logo.png" alt="AICCLI" class="logo"><span class="brand">AICCLI</span></a><div class="breadcrumb"><a href="index.html">Home</a> / Commands</div></div></header>
  <div class="page-header"><div class="container"><h1>⌨️ Commands</h1><p>Browse 280+ slash commands for Claude Code</p></div></div>
  <div class="container">
    <div class="search-row"><div class="search-box"><svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input type="text" class="search-input" id="search" placeholder="Search commands..."></div><div class="count-badge"><strong id="count">0</strong> commands</div></div>
    <div class="grid" id="grid"><div class="loading">Loading...</div></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <script>
    const ITEMS_PER_PAGE=30;let items=[],filtered=[];
    function render(p){const g=document.getElementById('grid');const s=(p-1)*ITEMS_PER_PAGE;g.innerHTML=filtered.slice(s,s+ITEMS_PER_PAGE).map(i=>`<a href="commands/${i.category||'general'}/${i.name}.html" class="card"><div class="card-header"><div class="card-icon">⌨️</div><div><div class="card-title">${i.name}</div><div class="card-category">${i.category||'general'}</div></div></div><div class="card-desc">${(i.description||'').replace(/[#*\[\]]/g,'').substring(0,150)}</div></a>`).join('');const t=Math.max(1,Math.ceil(filtered.length/ITEMS_PER_PAGE));let h=`<button class="page-btn" onclick="render(${p-1})" ${p===1?'disabled':''}>←</button>`;for(let i=1;i<=t;i++){if(i===1||i===t||(i>=p-1&&i<=p+1)){h+=`<button class="page-btn ${i===p?'active':''}" onclick="render(${i})">${i}</button>`;}}h+=`<button class="page-btn" onclick="render(${p+1})" ${p===t?'disabled':''}>→</button>`;document.getElementById('pagination').innerHTML=h;}
    fetch('components.json').then(r=>r.json()).then(d=>{items=d.commands||[];filtered=[...items];document.getElementById('count').textContent=items.length;render(1);});
    document.getElementById('search').addEventListener('input',e=>{filtered=items.filter(i=>i.name.toLowerCase().includes(e.target.value.toLowerCase())||(i.description&&i.description.toLowerCase().includes(e.target.value.toLowerCase())));render(1);});
  </script>
</body>
</html>
