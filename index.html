<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI - 1700+ AI Agents, Commands, Skills & MCP Integrations</title>
  <meta name="description" content="Browse and install 1700+ pre-built components for Claude Code. AI agents, slash commands, MCP integrations, hooks, and settings.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 24px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .search-container {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: #f5f5f5;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #1a1a1a;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      width: 20px;
      height: 20px;
    }

    .hero {
      text-align: center;
      padding: 60px 0 40px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 17px;
      color: #666;
      max-width: 600px;
      margin: 0 auto 32px;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .stat-box {
      background: #f5f5f5;
      padding: 16px 28px;
      border-radius: 10px;
      text-align: center;
      min-width: 120px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #1a1a1a;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 20px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

    .tab.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .tab .count {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.7;
    }

    .main-content {
      padding: 40px 0 80px;
    }

    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      color: #666;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      border-color: #1a1a1a;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .card-icon {
      width: 42px;
      height: 42px;
      background: #f5f5f5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .card-category {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-type {
      font-size: 11px;
      padding: 4px 10px;
      background: #f5f5f5;
      border-radius: 6px;
      color: #666;
      font-weight: 500;
    }

    .card-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
    }

    .page-btn {
      width: 40px;
      height: 40px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .page-btn:hover:not(:disabled) {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

    .page-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-ellipsis {
      color: #888;
      padding: 0 8px;
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e5e5;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: #888;
      font-size: 15px;
    }

    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }

    .no-results h3 {
      font-size: 18px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        gap: 16px;
      }
      .search-container {
        max-width: 100%;
        width: 100%;
      }
      .hero h1 {
        font-size: 28px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      .stats-row {
        gap: 10px;
      }
      .stat-box {
        padding: 12px 20px;
      }
      .stat-num {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo-section">
        <img src="logo.png" alt="AICCLI" class="logo">
        <span class="brand">AICCLI</span>
      </a>
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" id="search" placeholder="Search agents, skills, commands...">
      </div>
      <div style="font-size: 14px; color: #888; white-space: nowrap;">
        <span id="total-components">0</span> components
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>AI Components Library</h1>
      <p>Browse 1700+ pre-built agents, skills, commands, MCPs, hooks, and settings for Claude Code.</p>
      
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="skills-count">-</div>
          <div class="stat-label">Skills</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="agents-count">-</div>
          <div class="stat-label">Agents</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="commands-count">-</div>
          <div class="stat-label">Commands</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="mcps-count">-</div>
          <div class="stat-label">MCPs</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-category="all">All <span class="count" id="tab-all">0</span></button>
        <button class="tab" data-category="agents">Agents <span class="count" id="tab-agents">0</span></button>
        <button class="tab" data-category="skills">Skills <span class="count" id="tab-skills">0</span></button>
        <button class="tab" data-category="commands">Commands <span class="count" id="tab-commands">0</span></button>
        <button class="tab" data-category="mcps">MCPs <span class="count" id="tab-mcps">0</span></button>
        <button class="tab" data-category="settings">Settings <span class="count" id="tab-settings">0</span></button>
        <button class="tab" data-category="hooks">Hooks <span class="count" id="tab-hooks">0</span></button>
      </div>
    </div>
  </section>

  <main class="main-content">
    <div class="container">
      <div class="results-info">
        <span id="results-count">Showing 0 components</span>
        <span id="page-info">Page 1</span>
      </div>

      <div class="grid" id="grid">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Loading components...</p>
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script>
    const typeIcons = {
      skills: '⚡',
      agents: '🤖',
      commands: '⌨️',
      mcps: '🔌',
      settings: '⚙️',
      hooks: '🪝',
      sandbox: '📦',
      templates: '📋',
      plugins: '🔧',
      marketplace: '🛒',
      componentsMarketplace: '🛍️'
    };

    const ITEMS_PER_PAGE = 30;
    
    let allComponents = [];
    let filteredComponents = [];
    let currentCategory = 'all';
    let currentPage = 1;
    let totalPages = 1;

    function getFilePath(item, type) {
      const category = item.category || 'general';
      const baseType = type.replace(/s$/, '').replace(/Marketplace/, '').replace(/Components/, '');
      return `${baseType}s/${category}/${item.name}.html`;
    }

    function createCard(item, type) {
      const path = getFilePath(item, type);
      const description = item.description || item.content?.substring(0, 150) || 'No description available';
      const cleanDesc = description.replace(/[#*`\[\]]/g, '').substring(0, 180);
      
      return `
        <a href="${path}" class="card">
          <div class="card-header">
            <div class="card-icon">${typeIcons[type] || '📄'}</div>
            <div class="card-info">
              <div class="card-title">${item.name}</div>
              <div class="card-category">${item.category || 'general'}</div>
            </div>
            <span class="card-type">${type.slice(0, -1)}</span>
          </div>
          <div class="card-desc">${cleanDesc}</div>
        </a>
      `;
    }

    function renderPage(page) {
      const grid = document.getElementById('grid');
      const start = (page - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = filteredComponents.slice(start, end);

      if (filteredComponents.length === 0) {
        grid.innerHTML = `
          <div class="no-results">
            <h3>No components found</h3>
            <p>Try adjusting your search or filter</p>
          </div>
        `;
      } else {
        grid.innerHTML = pageItems.map(item => createCard(item, item.type)).join('');
      }

      document.getElementById('results-count').textContent = 
        `Showing ${start + 1}-${Math.min(end, filteredComponents.length)} of ${filteredComponents.length} components`;
      document.getElementById('page-info').textContent = 
        `Page ${page} of ${totalPages}`;

      renderPagination(page);
    }

    function renderPagination(current) {
      const pagination = document.getElementById('pagination');
      let html = '';

      html += `<button class="page-btn" onclick="goToPage(${current - 1})" ${current === 1 ? 'disabled' : ''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>`;

      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) {
          html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
      } else {
        if (current <= 4) {
          for (let i = 1; i <= 5; i++) {
            html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
          }
          html += '<span class="page-ellipsis">...</span>';
          html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
        } else if (current >= totalPages - 3) {
          html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
          html += '<span class="page-ellipsis">...</span>';
          for (let i = totalPages - 4; i <= totalPages; i++) {
            html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
          }
        } else {
          html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
          html += '<span class="page-ellipsis">...</span>';
          for (let i = current - 1; i <= current + 1; i++) {
            html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
          }
          html += '<span class="page-ellipsis">...</span>';
          html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }
      }

      html += `<button class="page-btn" onclick="goToPage(${current + 1})" ${current === totalPages ? 'disabled' : ''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>`;

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderPage(page);
      window.scrollTo({ top: 300, behavior: 'smooth' });
    }

    function filterComponents() {
      const searchTerm = document.getElementById('search').value.toLowerCase();

      filteredComponents = allComponents.filter(item => {
        const matchesCategory = currentCategory === 'all' || item.type === currentCategory;
        const matchesSearch = !searchTerm || 
          item.name.toLowerCase().includes(searchTerm) ||
          (item.description && item.description.toLowerCase().includes(searchTerm)) ||
          (item.category && item.category.toLowerCase().includes(searchTerm));
        
        return matchesCategory && matchesSearch;
      });

      totalPages = Math.max(1, Math.ceil(filteredComponents.length / ITEMS_PER_PAGE));
      currentPage = 1;
      renderPage(currentPage);
    }

    function init() {
      const grid = document.getElementById('grid');
      grid.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Loading components...</p>
        </div>
      `;

      fetch('components.json')
        .then(response => {
          if (!response.ok) throw new Error('Failed to load');
          return response.json();
        })
        .then(data => {
          allComponents = [];
          
          for (const [type, items] of Object.entries(data)) {
            if (Array.isArray(items)) {
              items.forEach(item => {
                allComponents.push({ ...item, type });
              });
              
              document.getElementById(`${type}-count`).textContent = items.length;
              document.getElementById(`tab-${type}`).textContent = items.length;
            }
          }

          document.getElementById('total-components').textContent = allComponents.length;
          document.getElementById('tab-all').textContent = allComponents.length;

          filteredComponents = [...allComponents];
          totalPages = Math.ceil(filteredComponents.length / ITEMS_PER_PAGE);
          renderPage(1);
        })
        .catch(error => {
          console.error('Error:', error);
          grid.innerHTML = `
            <div class="no-results">
              <h3>Failed to load components</h3>
              <p>Please check your internet connection and refresh</p>
            </div>
          `;
        });
    }

    document.getElementById('search').addEventListener('input', filterComponents);

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.category;
        filterComponents();
      });
    });

    init();
  </script>
</body>
</html>
