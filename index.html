<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI - AI Components Library</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100;padding:16px 0}
    header .container{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo img{width:36px;height:36px;border-radius:8px}
    .logo span{font-size:20px;font-weight:700;color:#1a1a1a}
    .search{flex:1;max-width:400px;position:relative}
    .search input{width:100%;padding:10px 16px 10px 40px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff}
    .search input:focus{outline:none;border-color:#1a1a1a}
    .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888}
    .hero{background:#fff;border-bottom:1px solid #e5e5e5;padding:40px 0;text-align:center}
    .hero h1{font-size:32px;font-weight:700;margin-bottom:8px}
    .hero p{color:#666;font-size:16px;margin-bottom:24px}
    .stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
    .stat{background:#f5f5f5;padding:12px 20px;border-radius:8px;font-size:14px}
    .stat strong{font-weight:600}
    .tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
    .tab{padding:10px 20px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#666;font-family:inherit}
    .tab:hover{border-color:#1a1a1a;color:#1a1a1a}
    .tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .main{padding:32px 0 64px}
    .info{display:flex;justify-content:space-between;margin-bottom:20px;font-size:14px;color:#666}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
    .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;text-decoration:none;color:inherit;display:block;transition:all .2s}
    .card:hover{border-color:#1a1a1a;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .card h3{font-size:15px;font-weight:600;margin-bottom:8px;color:#1a1a1a}
    .card p{font-size:14px;color:#666;line-height:1.5}
    .card .cat{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:40px}
    .page-btn{min-width:40px;height:40px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
    .page-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
    .page-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .loading{text-align:center;padding:80px;color:#888}
    @media(max-width:768px){header .container{flex-direction:column};.search{max-width:100%;width:100%}}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="AICCLI">
        <span>AICCLI</span>
      </a>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search components...">
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>AI Components Library</h1>
      <p>Browse 1700+ agents, skills, commands, MCPs, settings and hooks</p>
      <div class="stats">
        <div class="stat"><strong id="skills-num">-</strong> Skills</div>
        <div class="stat"><strong id="agents-num">-</strong> Agents</div>
        <div class="stat"><strong id="commands-num">-</strong> Commands</div>
        <div class="stat"><strong id="mcps-num">-</strong> MCPs</div>
        <div class="stat"><strong id="settings-num">-</strong> Settings</div>
        <div class="stat"><strong id="hooks-num">-</strong> Hooks</div>
      </div>
      <div class="tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="agents">Agents</button>
        <button class="tab" data-filter="skills">Skills</button>
        <button class="tab" data-filter="commands">Commands</button>
        <button class="tab" data-filter="mcps">MCPs</button>
        <button class="tab" data-filter="settings">Settings</button>
        <button class="tab" data-filter="hooks">Hooks</button>
      </div>
    </div>
  </section>

  <main class="main">
    <div class="container">
      <div class="info">
        <span id="count">Loading...</span>
        <span id="page-info"></span>
      </div>
      <div class="grid" id="grid"><div class="loading">Loading components...</div></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script>
    const PER_PAGE = 30;
    let data = [];
    let filter = 'all';
    let page = 1;
    let totalPages = 1;

    function getLink(item) {
      const cat = item.category || 'general';
      const type = item.type || item.category || 'components';
      const baseType = type.replace(/s$/, '').replace(/Marketplace/, '');
      const pluralType = baseType + 's';
      return pluralType + '/' + cat + '/' + item.name + '.html';
    }

    function render() {
      const grid = document.getElementById('grid');
      const filtered = filter === 'all' ? data : data.filter(i => {
        const t = i.type || '';
        return t === filter || t === filter.slice(0, -1);
      });

      document.getElementById('count').textContent = filtered.length + ' components';
      totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      if (page > totalPages) page = totalPages;

      const start = (page - 1) * PER_PAGE;
      const items = filtered.slice(start, start + PER_PAGE);

      if (items.length === 0) {
        grid.innerHTML = '<div class="loading">No components found</div>';
      } else {
        grid.innerHTML = items.map(i => {
          const icon = {'agents':'🤖','skills':'⚡','commands':'⌨️','mcps':'🔌','settings':'⚙️','hooks':'🪝'}[i.type] || '📄';
          const desc = (i.description || '').replace(/[#*\[\]]/g, '').substring(0, 120);
          return '<a href="' + getLink(i) + '" class="card"><h3>' + icon + ' ' + i.name + '</h3><p>' + desc + '</p><div class="cat">' + (i.category || 'general') + '</div></a>';
        }).join('');
      }

      renderPagination();
    }

    function renderPagination() {
      document.getElementById('page-info').textContent = 'Page ' + page + ' of ' + totalPages;
      let html = '<button class="page-btn" onclick="go(' + (page-1) + ')" ' + (page===1?'disabled':'') + '>←</button>';
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page-1 && i <= page+1)) {
          html += '<button class="page-btn ' + (i===page?'active':'') + '" onclick="go(' + i + ')">' + i + '</button>';
        } else if (i === page-2 || i === page+2) {
          html += '<span style="padding:0 4px">...</span>';
        }
      }
      html += '<button class="page-btn" onclick="go(' + (page+1) + ')" ' + (page===totalPages?'disabled':'') + '>→</button>';
      document.getElementById('pagination').innerHTML = html;
    }

    function go(p) {
      page = p;
      render();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    fetch('components.json')
      .then(r => r.json())
      .then(d => {
        data = [];
        for (const [type, items] of Object.entries(d)) {
          if (Array.isArray(items)) {
            items.forEach(item => data.push({...item, type}));
            document.getElementById(type + '-num').textContent = items.length;
          }
        }
        document.getElementById('count').textContent = data.length + ' components';
        render();
      })
      .catch(e => {
        document.getElementById('grid').innerHTML = '<div class="loading">Error loading data</div>';
        console.error(e);
      });

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = data.filter(i => 
        i.name.toLowerCase().includes(q) || 
        (i.description && i.description.toLowerCase().includes(q))
      );
      document.getElementById('count').textContent = filtered.length + ' components';
      totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      page = 1;
      
      const start = 0;
      const items = filtered.slice(start, start + PER_PAGE);
      const grid = document.getElementById('grid');
      
      if (items.length === 0) {
        grid.innerHTML = '<div class="loading">No results</div>';
      } else {
        grid.innerHTML = items.map(i => {
          const icon = {'agents':'🤖','skills':'⚡','commands':'⌨️','mcps':'🔌','settings':'⚙️','hooks':'🪝'}[i.type] || '📄';
          const desc = (i.description || '').replace(/[#*\[\]]/g, '').substring(0, 120);
          return '<a href="' + getLink(i) + '" class="card"><h3>' + icon + ' ' + i.name + '</h3><p>' + desc + '</p><div class="cat">' + (i.category || 'general') + '</div></a>';
        }).join('');
      }
      document.getElementById('page-info').textContent = 'Page 1 of ' + totalPages;
      document.getElementById('pagination').innerHTML = '';
    });

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        page = 1;
        render();
      });
    });
  </script>
</body>
</html>
