<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI - AI Components Library</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100;padding:12px 0}
    header .container{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo img{width:32px;height:32px;border-radius:6px}
    .logo span{font-size:18px;font-weight:700;color:#1a1a1a}
    .nav{display:flex;gap:8px}
    .nav a{padding:8px 16px;border-radius:6px;text-decoration:none;color:#666;font-size:14px;font-weight:500;transition:all .2s}
    .nav a:hover{background:#f5f5f5;color:#1a1a1a}
    .nav a.active{background:#1a1a1a;color:#fff}
    .hero{background:#fff;border-bottom:1px solid #e5e5e5;padding:32px 0}
    .hero h1{font-size:28px;font-weight:700;margin-bottom:6px}
    .hero p{color:#666;font-size:15px;margin-bottom:20px}
    .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .search-box{position:relative;flex:1;min-width:200px;max-width:300px}
    .search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff}
    .search-box input:focus{outline:none;border-color:#1a1a1a}
    .search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888}
    .filter-select{padding:10px 16px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff;font-family:inherit;cursor:pointer}
    .filter-select:focus{outline:none;border-color:#1a1a1a}
    .sort-select{padding:10px 16px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff;font-family:inherit;cursor:pointer}
    .main{padding:24px 0 64px}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .results{font-size:14px;color:#666}
    .results strong{color:#1a1a1a}
    .view-toggle{display:flex;gap:4px}
    .view-btn{padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px}
    .view-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
    .grid.list-view{grid-template-columns:1fr}
    .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;text-decoration:none;color:inherit;display:block;transition:all .2s}
    .card:hover{border-color:#1a1a1a;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
    .card-icon{width:40px;height:40px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .card-info{flex:1;min-width:0}
    .card h3{font-size:15px;font-weight:600;margin-bottom:4px;color:#1a1a1a;word-break:break-word}
    .card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .card-badge{font-size:11px;padding:3px 8px;border-radius:4px;background:#f5f5f5;color:#666}
    .card-badge.type{background:#e8f4ff;color:#0066cc}
    .card-desc{font-size:14px;color:#666;line-height:1.5;margin-bottom:12px}
    .card-footer{display:flex;justify-content:space-between;align-items:center}
    .card-author{font-size:12px;color:#888}
    .card-stats{font-size:12px;color:#888}
    .no-results{text-align:center;padding:60px;color:#888}
    .no-results h3{margin-bottom:8px;color:#1a1a1a}
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:40px}
    .page-btn{min-width:40px;height:40px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
    .page-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
    .page-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    @media(max-width:768px){header .container{flex-direction:column;align-items:flex-start}.nav{flex-wrap:wrap}.filters{flex-direction:column;width:100%}.search-box{max-width:100%}}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="AICCLI">
        <span>AICCLI</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="active">Components</a>
        <a href="docs.html">Docs</a>
        <a href="install.html">Install</a>
        <a href="https://github.com/nitorthecoder/ccaitmpl" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>AI Components Library</h1>
      <p>Browse 1,700+ agents, skills, commands, MCPs, settings and hooks</p>
      <div class="filters">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="Search components...">
        </div>
        <select id="category-filter" class="filter-select">
          <option value="">All Categories</option>
        </select>
        <select id="type-filter" class="filter-select">
          <option value="">All Types</option>
          <option value="agents">Agents</option>
          <option value="skills">Skills</option>
          <option value="commands">Commands</option>
          <option value="mcps">MCPs</option>
          <option value="settings">Settings</option>
          <option value="hooks">Hooks</option>
        </select>
        <select id="sort" class="sort-select">
          <option value="name">Sort: Name A-Z</option>
          <option value="name-desc">Sort: Name Z-A</option>
          <option value="downloads">Sort: Most Downloaded</option>
          <option value="newest">Sort: Newest</option>
        </select>
      </div>
    </div>
  </section>

  <main class="main">
    <div class="container">
      <div class="top-bar">
        <div class="results">
          <span id="count">Loading...</span> components
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" onclick="setView('grid')">Grid</button>
          <button class="view-btn" data-view="list" onclick="setView('list')">List</button>
        </div>
      </div>
      <div class="grid" id="grid"><div class="no-results"><p>Loading components...</p></div></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script>
    const PER_PAGE = 30;
    let data = [];
    let filteredData = [];
    let categories = [];
    let page = 1;
    let totalPages = 1;
    let currentView = 'grid';

    const typeIcons = {'agents':'🤖','skills':'⚡','commands':'⌨️','mcps':'🔌','settings':'⚙️','hooks':'🪝'};
    const typeLabels = {'agents':'Agent','skills':'Skill','commands':'Command','mcps':'MCP','settings':'Setting','hooks':'Hook'};

    function getLink(item) {
      const type = item.type || item.category || 'components';
      const baseType = type.replace(/s$/, '').replace(/Marketplace/, '');
      const cat = item.category || 'general';
      return baseType + 's/' + cat + '/' + item.name + '.html';
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category-filter').value;
      const typeFilter = document.getElementById('type-filter').value;
      const sort = document.getElementById('sort').value;

      filteredData = data.filter(item => {
        const matchSearch = !search || 
          item.name.toLowerCase().includes(search) ||
          (item.description && item.description.toLowerCase().includes(search)) ||
          (item.keywords && item.keywords.some(k => k.toLowerCase().includes(search)));
        const matchCategory = !category || item.category === category;
        const itemType = item.type || '';
        const matchType = !typeFilter || itemType === typeFilter || itemType === typeFilter.slice(0, -1);
        return matchSearch && matchCategory && matchType;
      });

      filteredData.sort((a, b) => {
        if (sort === 'name') return a.name.localeCompare(b.name);
        if (sort === 'name-desc') return b.name.localeCompare(a.name);
        if (sort === 'downloads') return (b.downloads || 0) - (a.downloads || 0);
        return 0;
      });

      document.getElementById('count').textContent = filteredData.length;
      totalPages = Math.max(1, Math.ceil(filteredData.length / PER_PAGE));
      if (page > totalPages) page = 1;
      renderPage();
    }

    function renderPage() {
      const grid = document.getElementById('grid');
      const start = (page - 1) * PER_PAGE;
      const items = filteredData.slice(start, start + PER_PAGE);

      if (items.length === 0) {
        grid.innerHTML = '<div class="no-results"><h3>No components found</h3><p>Try adjusting your filters</p></div>';
      } else {
        grid.innerHTML = items.map(item => {
          const icon = typeIcons[item.type] || '📄';
          const typeLabel = typeLabels[item.type] || item.type;
          const desc = (item.description || '').replace(/[#*\[\]]/g, '').substring(0, 150);
          return `<a href="${getLink(item)}" class="card">
            <div class="card-header">
              <div class="card-icon">${icon}</div>
              <div class="card-info">
                <h3>${item.name}</h3>
                <div class="card-meta">
                  <span class="card-badge type">${typeLabel}</span>
                  <span class="card-badge">${item.category || 'general'}</span>
                </div>
              </div>
            </div>
            <p class="card-desc">${desc}</p>
            <div class="card-footer">
              <span class="card-author">${item.author || 'Community'}</span>
              <span class="card-stats">${item.downloads || 0} downloads</span>
            </div>
          </a>`;
        }).join('');
      }

      renderPagination();
    }

    function renderPagination() {
      document.getElementById('pagination').innerHTML = '';
      if (totalPages <= 1) return;
      
      let html = `<button class="page-btn" onclick="go(${page-1})" ${page===1?'disabled':''}>←</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page-1 && i <= page+1)) {
          html += `<button class="page-btn ${i===page?'active':''}" onclick="go(${i})">${i}</button>`;
        } else if (i === page-2 || i === page+2) {
          html += '<span style="padding:0 4px">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="go(${page+1})" ${page===totalPages?'disabled':''}>→</button>`;
      document.getElementById('pagination').innerHTML = html;
    }

    function go(p) {
      page = p;
      renderPage();
      window.scrollTo({top: 200, behavior: 'smooth'});
    }

    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      document.getElementById('grid').className = view === 'list' ? 'grid list-view' : 'grid';
    }

    function populateCategories() {
      categories = [...new Set(data.map(item => item.category).filter(Boolean))].sort();
      const select = document.getElementById('category-filter');
      select.innerHTML = '<option value="">All Categories</option>' + 
        categories.map(c => `<option value="${c}">${c.replace(/-/g, ' ')}</option>`).join('');
    }

    fetch('components.json')
      .then(r => r.json())
      .then(d => {
        for (const [type, items] of Object.entries(d)) {
          if (Array.isArray(items)) {
            items.forEach(item => data.push({...item, type}));
          }
        }
        populateCategories();
        applyFilters();
      });

    ['search', 'category-filter', 'type-filter', 'sort'].forEach(id => {
      document.getElementById(id).addEventListener('change', applyFilters);
      if (id === 'search') document.getElementById(id).addEventListener('input', applyFilters);
    });
  </script>
</body>
</html>
