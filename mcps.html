<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI MCPs - 69 Model Context Protocol Integrations</title>
  <meta name="description" content="Browse 69 MCP integrations for Claude Code. Database, browser automation, AI tools, and more.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg-dark: #0a0a0f; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --text-primary: #ffffff; --text-secondary: #a0a0b0; --text-muted: #606070; --accent: #a855f7; --accent-glow: rgba(168, 85, 247, 0.3); --cyan: #22d3ee; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%); pointer-events: none; z-index: -1; }
    header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); background: rgba(10, 10, 15, 0.8); }
    .header-content { max-width: 1400px; margin: 0 auto; padding: 16px 20px; display: flex; align-items: center; gap: 20px; }
    .logo-link { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--accent); }
    .brand { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
    .breadcrumb { margin-left: auto; color: var(--text-secondary); font-size: 14px; }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 48px; margin-bottom: 10px; letter-spacing: -2px; }
    h1 span { background: linear-gradient(135deg, var(--accent), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: var(--text-secondary); font-size: 18px; margin-bottom: 40px; }
    .stat-item { padding: 16px 24px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; display: inline-block; }
    .stat-item .num { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    .stat-item .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .search-input { width: 100%; max-width: 500px; padding: 16px 24px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-primary); font-size: 16px; font-family: inherit; margin: 30px 0; transition: all 0.3s; }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
    .search-input::placeholder { color: var(--text-muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; backdrop-filter: blur(20px); transition: all 0.3s; text-decoration: none; color: inherit; display: block; }
    .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 40px var(--accent-glow); }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .card-icon { font-size: 24px; }
    .card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .card-category { font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; margin-left: auto; }
    .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
    .loading { text-align: center; padding: 100px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="index.html" class="logo-link"><img src="logo.png" alt="AICCLI" class="logo"><span class="brand">AICCLI</span></a>
      <div class="breadcrumb"><a href="index.html">Home</a> / MCPs</div>
    </div>
  </header>
  <div class="container">
    <h1>🔌 <span>MCPs</span></h1>
    <p class="subtitle">Browse 69 MCP integrations for Claude Code. Database, browser automation, AI tools, and more.</p>
    <div class="stat-item"><span class="num" id="count">0</span><br><span class="label">Total MCPs</span></div>
    <input type="text" class="search-input" id="search" placeholder="Search MCPs...">
    <div class="grid" id="grid"><div class="loading">Loading MCPs...</div></div>
  </div>
  <script>
    let mcps = [];
    function createCard(item) {
      const desc = (item.description || '').replace(/[#*`]/g, '').substring(0, 150);
      const category = item.category || 'general';
      return '<a href="mcps/'+category+'/'+item.name+'.html" class="card"><div class="card-header"><span class="card-icon">🔌</span><span class="card-title">'+item.name+'</span><span class="card-category">'+category+'</span></div><div class="card-desc">'+desc+'...</div></a>';
    }
    function render(items) { document.getElementById('grid').innerHTML = items.length ? items.map(createCard).join('') : '<div class="loading">No MCPs found</div>'; }
    function filter() { const t = document.getElementById('search').value.toLowerCase(); render(mcps.filter(s => s.name.toLowerCase().includes(t) || (s.description && s.description.toLowerCase().includes(t)))); }
    fetch('components.json').then(r => r.json()).then(data => { mcps = data.mcps || []; document.getElementById('count').textContent = mcps.length; render(mcps); });
    document.getElementById('search').addEventListener('input', filter);
  </script>
</body>
</html>
