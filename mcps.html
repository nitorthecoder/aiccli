<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICCLI - MCPs</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100;padding:16px 0}
    header .container{display:flex;align-items:center;justify-content:space-between;gap:20px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo img{width:36px;height:36px;border-radius:8px}
    .logo span{font-size:20px;font-weight:700;color:#1a1a1a}
    .breadcrumb{font-size:14px;color:#888}
    .breadcrumb a{color:#666;text-decoration:none}
    .hero{background:#fff;border-bottom:1px solid #e5e5e5;padding:40px 0}
    .hero h1{font-size:32px;font-weight:700;margin-bottom:8px}
    .hero p{color:#666;font-size:16px}
    .bar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;gap:16px;flex-wrap:wrap}
    .search{position:relative;flex:1;max-width:400px}
    .search input{width:100%;padding:10px 16px 10px 40px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff}
    .search input:focus{outline:none;border-color:#1a1a1a}
    .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888}
    .count{background:#f5f5f5;padding:10px 20px;border-radius:8px;font-size:14px}
    .count strong{font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding-bottom:60px}
    .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;text-decoration:none;color:inherit;display:block;transition:all .2s}
    .card:hover{border-color:#1a1a1a;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .card h3{font-size:15px;font-weight:600;margin-bottom:8px;color:#1a1a1a}
    .card p{font-size:14px;color:#666;line-height:1.5}
    .card .cat{font-size:11px;color:#888;text-transform:uppercase;margin-top:8px}
    .pagination{display:flex;justify-content:center;gap:6px;padding:40px 0}
    .page-btn{min-width:40px;height:40px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
    .page-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
    .page-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .loading{text-align:center;padding:80px;color:#888}
    @media(max-width:768px){header .container{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo"><img src="logo.png" alt="AICCLI" onerror="this.style.display='none'"><span>AICCLI</span></a>
      <div class="breadcrumb"><a href="index.html">Home</a> / MCPs</div>
    </div>
  </header>
  <section class="hero">
    <div class="container">
      <h1>🔌 MCPs</h1>
      <p>Browse all MCPs for Claude Code</p>
    </div>
  </section>
  <div class="container">
    <div class="bar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search MCPs...">
      </div>
      <div class="count"><strong id="count">0</strong> MCPs</div>
    </div>
    <div class="grid" id="grid"><div class="loading">Loading...</div></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <script>
    const PER_PAGE = 30;
    let items = [];
    let page = 1;

    function render(p) {
      const g = document.getElementById('grid');
      const start = (p - 1) * PER_PAGE;
      const pageItems = items.slice(start, start + PER_PAGE);
      if (pageItems.length === 0) {
        g.innerHTML = '<div class="loading">No results</div>';
      } else {
        g.innerHTML = pageItems.map(i => '<a href="mcps/' + (i.category || 'general') + '/' + i.name + '.html" class="card"><h3>' + i.name + '</h3><p>' + ((i.description || '').replace(/[#*\[\]]/g, '').substring(0, 120)) + '</p><div class="cat">' + (i.category || 'general') + '</div></a>').join('');
      }
      const total = Math.max(1, Math.ceil(items.length / PER_PAGE));
      let h = '<button class="page-btn" onclick="render(' + (p-1) + ')" ' + (p===1?'disabled':'') + '>←</button>';
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= p-1 && i <= p+1)) {
          h += '<button class="page-btn ' + (i===p?'active':'') + '" onclick="render(' + i + ')">' + i + '</button>';
        }
      }
      h += '<button class="page-btn" onclick="render(' + (p+1) + ')" ' + (p===total?'disabled':'') + '>→</button>';
      document.getElementById('pagination').innerHTML = h;
    }

    fetch('components.json').then(r => r.json()).then(d => {
      items = d.mcps || [];
      document.getElementById('count').textContent = items.length;
      render(1);
    });

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = items.filter(i => i.name.toLowerCase().includes(q) || (i.description && i.description.toLowerCase().includes(q)));
      const g = document.getElementById('grid');
      if (filtered.length === 0) {
        g.innerHTML = '<div class="loading">No results</div>';
      } else {
        g.innerHTML = filtered.slice(0, 30).map(i => '<a href="mcps/' + (i.category || 'general') + '/' + i.name + '.html" class="card"><h3>' + i.name + '</h3><p>' + ((i.description || '').replace(/[#*\[\]]/g, '').substring(0, 120)) + '</p><div class="cat">' + (i.category || 'general') + '</div></a>').join('');
      }
      document.getElementById('pagination').innerHTML = '';
    });
  </script>
</body>
</html>
